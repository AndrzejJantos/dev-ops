# Main API Containers for CheaperForDrug
# Simplified Architecture - 4 containers total
#
# - web-1, web-2: Public API + Admin (ports 3020, 3021)
# - sidekiq-1: All background jobs
# - clockwork: Scheduler
#
# Network: host mode (containers share host network stack)
# Database: PostgreSQL on localhost:5432
# Redis: 127.0.0.1:6379/2 (NEVER use 172.17.0.1 Docker bridge with host networking)

services:
  # ===========================================================================
  # WEB CONTAINERS (Ports 3020, 3021)
  # ===========================================================================
  web-1:
    image: cheaperfordrug-api:latest
    container_name: cheaperfordrug-api-web-1
    network_mode: host
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file: /home/andrzej/apps/cheaperfordrug-api/.env.production
    environment:
      - PORT=3020
      - CONTAINER_NAME=web-1
      - RAILS_ENV=production
      - RACK_ENV=production
    volumes:
      - ${LOG_DIR:-/home/andrzej/apps/cheaperfordrug-api/logs}:/app/log
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/tmp:size=100M,mode=1777
    command: /bin/bash -c "mkdir -p /app/tmp/pids /app/tmp/cache /app/tmp/sockets && exec bundle exec puma -C config/puma.rb"
    healthcheck:
      # Check both HTTP endpoint AND Redis connectivity
      test: ["CMD-SHELL", "curl -sf http://localhost:3020/up > /dev/null && bundle exec ruby -e \"require 'redis'; Redis.new(url: ENV['REDIS_URL'] || 'redis://127.0.0.1:6379/2').ping\" > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web-2:
    image: cheaperfordrug-api:latest
    container_name: cheaperfordrug-api-web-2
    network_mode: host
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file: /home/andrzej/apps/cheaperfordrug-api/.env.production
    environment:
      - PORT=3021
      - CONTAINER_NAME=web-2
      - RAILS_ENV=production
      - RACK_ENV=production
    volumes:
      - ${LOG_DIR:-/home/andrzej/apps/cheaperfordrug-api/logs}:/app/log
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/tmp:size=100M,mode=1777
    command: /bin/bash -c "mkdir -p /app/tmp/pids /app/tmp/cache /app/tmp/sockets && exec bundle exec puma -C config/puma.rb"
    healthcheck:
      # Check both HTTP endpoint AND Redis connectivity
      test: ["CMD-SHELL", "curl -sf http://localhost:3021/up > /dev/null && bundle exec ruby -e \"require 'redis'; Redis.new(url: ENV['REDIS_URL'] || 'redis://127.0.0.1:6379/2').ping\" > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # SIDEKIQ WORKER
  # Health check verifies Redis connectivity (Sidekiq depends entirely on Redis)
  # ===========================================================================
  sidekiq-1:
    image: cheaperfordrug-api:latest
    container_name: cheaperfordrug-api-sidekiq-1
    network_mode: host
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file: /home/andrzej/apps/cheaperfordrug-api/.env.production
    environment:
      - CONTAINER_NAME=sidekiq-1
      - RAILS_ENV=production
      - RACK_ENV=production
      - SIDEKIQ_CONCURRENCY=${SIDEKIQ_CONCURRENCY:-10}
    volumes:
      - ${LOG_DIR:-/home/andrzej/apps/cheaperfordrug-api/logs}:/app/log
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/tmp:size=100M,mode=1777
    command: /bin/bash -c "mkdir -p /app/tmp/pids /app/tmp/cache /app/tmp/sockets && cd /app && bundle exec sidekiq"
    healthcheck:
      # Verify Redis is reachable (Sidekiq is useless without Redis)
      test: ["CMD-SHELL", "bundle exec ruby -e \"require 'redis'; Redis.new(url: ENV['REDIS_URL'] || 'redis://127.0.0.1:6379/2').ping\" > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # CLOCKWORK (Scheduler)
  # Health check verifies Redis connectivity (Clockwork enqueues jobs to Redis)
  # ===========================================================================
  clockwork:
    image: cheaperfordrug-api:latest
    container_name: cheaperfordrug-api-clockwork
    network_mode: host
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file: /home/andrzej/apps/cheaperfordrug-api/.env.production
    environment:
      - CONTAINER_NAME=clockwork
      - RAILS_ENV=production
      - RACK_ENV=production
    volumes:
      - ${LOG_DIR:-/home/andrzej/apps/cheaperfordrug-api/logs}:/app/log
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/tmp:size=100M,mode=1777
    command: /bin/bash -c "mkdir -p /app/tmp/pids /app/tmp/cache /app/tmp/sockets && cd /app && bundle exec clockwork lib/clock.rb"
    healthcheck:
      # Verify Redis is reachable (Clockwork enqueues Sidekiq jobs via Redis)
      test: ["CMD-SHELL", "bundle exec ruby -e \"require 'redis'; Redis.new(url: ENV['REDIS_URL'] || 'redis://127.0.0.1:6379/2').ping\" > /dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
